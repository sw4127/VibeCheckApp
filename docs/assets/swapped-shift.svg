<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300" font-family="Georgia, serif">
  <rect width="860" height="300" fill="#0B0A08"/>
  <text x="56" y="30" fill="#fff" font-size="18" font-weight="bold">Mean rating shift toward the label — swapped vs. truthful</text>
  <text x="56" y="48" fill="#8a8578" font-size="12">SYNTHETIC DEMO DATA (n=300, seeded) — real cohort chart replaces this · rating points on a 0–10 scale</text>
  <line x1="430.0" y1="66" x2="430.0" y2="264" stroke="#8a8578" stroke-dasharray="3 3"/>
  <text x="430.0" y="282" fill="#8a8578" font-size="12" text-anchor="middle">0 (no sway)</text>
  <rect x="430.0" y="90" width="207.2" height="34" fill="hsl(42 80% 62%)"/>
  <text x="56" y="82" fill="#c9c2b2" font-size="13">swapped labels (900 item-ratings)</text>
  <text x="645.2" y="112" fill="#fff" font-size="14" font-weight="bold" text-anchor="start">+1.39 pts</text>
  <rect x="430.0" y="170" width="124.1" height="34" fill="hsl(42 30% 45%)"/>
  <text x="56" y="162" fill="#c9c2b2" font-size="13">truthful labels (1500 item-ratings)</text>
  <text x="562.1" y="192" fill="#fff" font-size="14" font-weight="bold" text-anchor="start">+0.83 pts</text>
  <text x="430" y="150" fill="#ffffff" opacity="0.14" font-size="42" font-weight="bold" text-anchor="middle" transform="rotate(-10 430 150)">SYNTHETIC DEMO DATA</text>
</svg>
